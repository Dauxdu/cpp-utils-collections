name: macOS Build

on:
  workflow_call:
    secrets:
      API_TOKEN:
        required: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install CMake 4.3
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.3.x"
          github-api-token: ${{ secrets.API_TOKEN }}

      - name: Install GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: "15"

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake --preset macos-debug

      - name: Build
        run: cmake --build --preset macos-debug
