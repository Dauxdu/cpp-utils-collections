name: Linux Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install CMake 4.3
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.3"

      - name: Install GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: "15"

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential gcc g++ ninja-build

      - name: Verify CMake version
        run: cmake --version

      - name: Configure
        run: cmake --preset linux-debug

      - name: Build
        run: cmake --build --preset linux-debug
