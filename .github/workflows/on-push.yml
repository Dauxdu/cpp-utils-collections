name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - "**.cpp"
      - "**.cppm"
  pull_request:
    branches: [main]
    paths:
      - "**.cpp"
      - "**.cppm"

jobs:
  linux:
    name: Build for Linux
    uses: ./.github/workflows/os-linux.yml

  windows:
    name: Build for Windows
    uses: ./.github/workflows/os-windows.yml
