name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  linux:
    name: Build for Linux
    uses: ./.github/workflows/os-linux.yml

  windows:
    name: Build for Windows
    uses: ./.github/workflows/os-windows.yml
