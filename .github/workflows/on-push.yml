name: CMake Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug]
        include:
          - os: ubuntu-latest
            preset: linux-debug
            compiler: g++
          - os: macos-latest
            preset: macos-debug
            compiler: clang++
          - os: windows-latest
            preset: windows-debug
            compiler: cl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure CMake (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      - name: Build project
        run: cmake --build --preset ${{ matrix.preset }} --config ${{ matrix.build_type }}
