name: Windows Build

on:
  workflow_call:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install CMake 4.3
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.3"

      - name: Verify CMake version
        run: cmake --version

      - name: Configure
        run: cmake --preset windows-debug

      - name: Build
        run: cmake --build --preset windows-debug --config Debug
